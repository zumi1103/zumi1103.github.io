<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dev Tools</title>
    
    <style>
        /* --- カラースキーム（CSS変数） --- */
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --border-color: #444;
            --accent-color: #5c6bc0;
            --hover-bg: #2c3e50;
            --input-bg: #1e1e1e;
            --sub-text: #aaa;
        }

        body.light-mode {
            --bg-color: #f8f9fa;
            --text-color: #333333;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --accent-color: #5c6bc0;
            --hover-bg: #e1f0fa;
            --input-bg: #f9f9f9;
            --sub-text: #666;
        }

        /* --- 全体設定 --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ヘッダー領域 --- */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        /* 右側のアイコンを並べるコンテナ */
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-btn, .theme-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-color);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .menu-btn:hover, .theme-btn:hover { background-color: var(--border-color); }

        /* GitHubリンク用のスタイル */
        .github-link {
            text-decoration: none;
            font-size: 22px;
            color: var(--text-color);
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
        }
        .github-link:hover {
            opacity: 0.7;
        }

        /* --- サイドバー --- */
        .sidebar {
            position: fixed;
            top: 60px;
            left: -250px; 
            width: 250px;
            height: calc(100vh - 60px);
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            transition: left 0.3s ease;
            z-index: 900;
            padding-top: 20px;
        }
        .sidebar.open { left: 0; }

        .nav-item {
            padding: 15px 25px;
            font-size: 1.1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-item:hover, .nav-item.active { background-color: var(--hover-bg); }
        .external-icon { font-size: 0.8rem; color: var(--sub-text); }

        /* --- メインコンテンツ領域 --- */
        .main-content {
            margin-top: 60px;
            padding: 20px;
            width: 100%;
            height: calc(100vh - 60px);
            overflow-y: auto;
            box-sizing: border-box;
            transition: margin-left 0.3s ease;
        }
        
        @media (min-width: 768px) {
            body.sidebar-open .main-content { margin-left: 250px; width: calc(100% - 250px); }
        }

        .view-section { display: none; max-width: 800px; margin: 0 auto; }
        .view-section.active { display: block; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        p.desc { text-align: center; color: var(--sub-text); margin-bottom: 20px; }

        /* --- 共通コンポーネント --- */
        button.action-btn {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            background-color: var(--border-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            transition: all 0.3s;
            font-weight: bold;
            display: inline-block;
            text-align: center;
        }
        button.action-btn:hover:not(:disabled) { background-color: var(--text-color); color: var(--bg-color); }
        button.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- My Repomix 固有スタイル --- */
        #dropZoneRepo {
            position: relative;
            overflow: hidden;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
            background-color: var(--card-bg);
            transition: all 0.3s ease;
        }
        #dropZoneRepo:hover { background-color: var(--hover-bg); border-color: var(--accent-color); }
        
        #folderInputRepo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        textarea {
            width: 100%; height: 300px; margin-top: 10px; font-family: monospace;
            background-color: var(--input-bg); color: var(--text-color);
            border: 1px solid var(--border-color); padding: 10px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header class="header">
        <button class="menu-btn" id="menuBtn" title="メニュー">☰</button>
        <div style="font-weight: bold; font-size: 1.2rem;">My Dev Tools</div>
        
        <div class="header-right">
            <a href="https://github.com/zumi1103/zumi1103.github.io/tree/main" target="_blank" class="github-link" title="Githubへ移動">📁</a>
            <button class="theme-btn" id="themeToggle" title="テーマ切り替え">☀️</button>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="nav-item active" data-target="repomix-view">My Repomix</div>
        <div class="nav-item" data-href="https://alexleybourne.github.io/chrome-extension-icon-generator/">
            My Icon <span class="external-icon">↗</span>
        </div>
    </nav>

    <main class="main-content" id="mainContent">
        
        <section id="repomix-view" class="view-section active">
            <h1>📁 My Repomix</h1>
            <p class="desc">開発フォルダをドロップして、Gemini用のテキストに変換します。</p>

            <div id="dropZoneRepo">
                ここにフォルダをドラッグ＆ドロップ<br>
                <button class="action-btn" style="margin-top:15px; font-size:14px; position:relative; z-index:1;">または フォルダを選択</button>
                <input type="file" id="folderInputRepo" webkitdirectory directory multiple>
            </div>

            <button class="action-btn" id="copyBtnRepo" style="width:100%; margin-bottom:10px;" disabled>📋 結果をコピーしてGeminiを開く</button>
            <textarea id="outputRepo" placeholder="ここにまとまったコードが表示されます..." readonly></textarea>
        </section>

    </main>

    <script>
        /* ==========================================
           1. 共通UIロジック (テーマ & メニュー)
        ========================================== */
        const body = document.body;
        const themeToggle = document.getElementById('themeToggle');
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const navItems = document.querySelectorAll('.nav-item');
        const viewSections = document.querySelectorAll('.view-section');

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            themeToggle.textContent = body.classList.contains('light-mode') ? '🌙' : '☀️';
        });

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            body.classList.toggle('sidebar-open');
        });

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const externalHref = item.getAttribute('data-href');
                if (externalHref) {
                    window.open(externalHref, '_blank');
                    if (window.innerWidth < 768) {
                        sidebar.classList.remove('open');
                        body.classList.remove('sidebar-open');
                    }
                    return;
                }

                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                
                const targetId = item.getAttribute('data-target');
                viewSections.forEach(section => {
                    section.classList.remove('active');
                    if(section.id === targetId) section.classList.add('active');
                });

                if (window.innerWidth < 768) {
                    sidebar.classList.remove('open');
                    body.classList.remove('sidebar-open');
                }
            });
        });

        /* ==========================================
           2. My Repomix 固有ロジック
        ========================================== */
        const folderInputRepo = document.getElementById('folderInputRepo');
        const outputRepo = document.getElementById('outputRepo');
        const copyBtnRepo = document.getElementById('copyBtnRepo');
        const ignorePaths = ['.git', 'node_modules', '.png', '.jpg', '.DS_Store'];

        folderInputRepo.addEventListener('change', (event) => {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            
            files.forEach(f => f.customPath = f.webkitRelativePath);
            processRepoFiles(files);
            
            event.target.value = '';
        });

        async function processRepoFiles(files) {
            outputRepo.value = "読み込み中...\n";
            let combinedText = "<repository>\n\n";
            let validFileCount = 0;

            for (const file of files) {
                if (ignorePaths.some(ignore => file.customPath.includes(ignore))) continue;
                try {
                    const text = await file.text();
                    combinedText += `<file path="${file.customPath}">\n${text}\n</file>\n\n`;
                    validFileCount++;
                } catch (e) { 
                    console.warn(`テキスト読み込みエラー（スキップします）: ${file.customPath}`, e); 
                }
            }
            
            combinedText += "</repository>";
            
            if (validFileCount === 0) {
                outputRepo.value = "読み込み可能なコードファイルが見つかりませんでした。";
                copyBtnRepo.disabled = true;
            } else {
                outputRepo.value = combinedText;
                copyBtnRepo.disabled = false;
            }
        }

        copyBtnRepo.addEventListener('click', () => {
            outputRepo.select();
            document.execCommand('copy');
            window.open('https://gemini.google.com/app', '_blank');
        });
    </script>
</body>
</html>
