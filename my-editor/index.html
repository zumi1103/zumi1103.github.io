<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Editor（VSCode風）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toolbar">
        <h1 id="app-title">My Editor</h1>
        <button id="openBtn">ファイルを開く</button>
        <div id="tabs-container"></div>
        
        <div id="zoom-controls">
            <button id="zoomOutBtn" title="ズームアウト (Ctrl+-)">－</button>
            <button id="zoomResetBtn" title="ズームリセット (Ctrl+0)">R</button>
            <button id="zoomInBtn" title="ズームイン (Ctrl+=)">＋</button>
        </div>
        
        <button id="helpBtn" title="ショートカットキー一覧">i</button>
    </div>

    <div id="main-area">
        <div id="editor-container"></div>
        
        <div id="empty-state">
            <div class="empty-state-content">
                <h2>ここにファイルをドラッグ＆ドロップ</h2>
                <p>または左上の「ファイルを開く」から選択してください</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-hidden">保存しました！</div>

    <div id="helpModal" class="modal-hidden">
        <div class="modal-content">
            <span id="closeModalBtn" class="modal-close">&times;</span>
            <h2>ショートカットキー一覧</h2>
            <table>
                <tr><th>機能</th><th>Windows</th><th>Mac</th></tr>
                <tr><td>保存</td><td>Ctrl + S</td><td>Cmd + S</td></tr>
                <tr><td>タブを閉じる</td><td>Alt + W</td><td>Option + W</td></tr>
                <tr><td>ズームイン</td><td>Ctrl + ホイール上<br>または Ctrl + ＋</td><td>Cmd + ホイール上<br>または Cmd + ＋</td></tr>
                <tr><td>ズームアウト</td><td>Ctrl + ホイール下<br>または Ctrl + －</td><td>Cmd + ホイール下<br>または Cmd + －</td></tr>
                <tr><td>ズームリセット</td><td>Ctrl + 0</td><td>Cmd + 0</td></tr>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.js"></script>
    <script src="app.js"></script>
</body>
</html>
